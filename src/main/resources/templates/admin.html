        table{border-collapse:collapse;width:100%;margin-top:16px}
        th,td{padding:8px;border:1px solid #e6e6e6;text-align:left}
    </style>
</head>

    <p style="margin-top:12px">Current main currency: <strong id="currentMain">EUR</strong></p>
    <p id="notice" class="notice" aria-live="polite"></p>

</div>

<script>
    const FIXER_API_KEY = '32e7de9474eed326c1bfab7ea945e955';
    let mainCurrency = 'EUR';

    async function loadFixerData() {
        const tbody = document.getElementById('ratesBody');
        if (!tbody) return;

        const url = `https://data.fixer.io/api/latest?access_key=${FIXER_API_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data || !data.rates) {
                tbody.innerHTML = '<tr><td colspan="2">Failed to load data</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            for (const cur in data.rates) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${cur}</td><td>${data.rates[cur]}</td>`;
                tbody.appendChild(tr);
            }
            document.getElementById('currentMain').textContent = mainCurrency;
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="2">Connection error</td></tr>';
        }
    }

    function showNotice(text, isError){
        const n = document.getElementById('notice');
        if(n) {
            n.textContent = text;
            n.className = isError ? 'notice error' : 'notice';
        }
    }

    async function setMainCurrency(event){
        event.preventDefault();
        const select = document.getElementById('mainSelect');
        const value = select.value;

        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        try {
            const res = await fetch('/api/admin/set-base?baseCurrency=' + encodeURIComponent(value), {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            });

            if(!res.ok){
                const text = await res.text();
                showNotice('Server error: ' + text, true);
                return;
            }

            const data = await res.json();
            mainCurrency = data.base;
            document.getElementById('currentMain').textContent = mainCurrency;
            showNotice('Main currency changed to: ' + mainCurrency);

            await loadFixerData();
        } catch(err){
            showNotice('Error sending request: ' + err.message, true);
        }
    }

    window.onload = function(){
        const form = document.getElementById('adminForm');
        if(form) form.addEventListener('submit', setMainCurrency);
        const logoutBtn = document.getElementById('logoutBtn');
        if(logoutBtn) logoutBtn.addEventListener('click', ()=>{ location.href = '/'; });

        loadFixerData();
    };
</script>
